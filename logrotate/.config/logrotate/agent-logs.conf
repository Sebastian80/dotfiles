# Agent log rotation — dippy audit log (log-full may contain secrets in
# command args, so old rotations must not accumulate) and the Claude Code
# hook-approvals log. Both are plain append files with no built-in rotation.
# copytruncate because the writers keep appending to the same path.
/home/sebastian/.dippy/audit.log
/home/sebastian/.claude/hook-approvals.log {
    weekly
    rotate 4
    compress
    missingok
    notifempty
    copytruncate
}
